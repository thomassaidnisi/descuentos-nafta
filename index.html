<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descuentos en Nafta · Argentina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0efe9;
  --border: #e4e2db; --text: #1a1a18; --muted: #7a7a76; --radius: 16px;
  --alto-bg: #eaf3de; --alto-c: #2d6a11;
  --medio-bg: #ddeeff; --medio-c: #0d4f8f;
  --bajo-bg: #f0efe9; --bajo-c: #7a7a76;
}

.dark {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
  --border: rgba(255,255,255,0.08); --text: #f0f0ee; --muted: #888884;
  --alto-bg: rgba(0,155,119,0.15); --alto-c: #4ecca3;
  --medio-bg: rgba(55,138,221,0.15); --medio-c: #7ab8f5;
  --bajo-bg: rgba(255,255,255,0.07); --bajo-c: #888884;
}

body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; position: sticky; top: 0; z-index: 10; }
.header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.logo-area { display: flex; align-items: center; gap: 10px; }
.logo-box { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #009B77, #0057A8); display: flex; align-items: center; justify-content: center; font-size: 17px; }
h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
.header-right { display: flex; align-items: center; gap: 10px; }
.update-chip { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--surface2); color: var(--muted); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
.toggle-wrap { display: flex; align-items: center; gap: 6px; }
.toggle-icon { font-size: 14px; cursor: pointer; }
.dark-toggle { width: 38px; height: 22px; border-radius: 11px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
.dark-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--muted); transition: transform 0.2s, background 0.2s; }
.dark .dark-toggle::after { transform: translateX(16px); background: #f0f0ee; }

.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

.section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }

.hoy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 10px; margin-bottom: 2.5rem; }
.hoy-card { border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.hoy-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.hoy-banco { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.hoy-pct { font-size: 30px; font-weight: 600; letter-spacing: -0.03em; font-family: 'DM Mono', monospace; }
.hoy-chip { font-size: 11px; margin-top: 6px; padding: 2px 8px; border-radius: 20px; display: inline-block; font-weight: 500; }
.hoy-det { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.4; }

.filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 1rem; }
.filter-btn { font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.filter-btn:hover { color: var(--text); border-color: var(--text); }

.day-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.75rem; align-items: center; }
.day-lbl { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
.day-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.day-btn:hover { color: var(--text); }
.day-btn.active { background: var(--surface); color: var(--text); border-color: var(--text); font-weight: 500; }

.station-block { margin-bottom: 2.5rem; }
.station-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.station-logo { width: 52px; height: 52px; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.station-logo img { width: 100%; height: 100%; object-fit: contain; padding: 5px; }
.station-logo-fallback { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
.station-name { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
.station-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.sub-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 10px 0 8px; }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }

.bank-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px 12px 18px; position: relative; overflow: hidden; }
.bank-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.bank-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
.bank-nombre { font-size: 13px; font-weight: 500; line-height: 1.3; }
.pct-pill { font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 20px; white-space: nowrap; font-family: 'DM Mono', monospace; flex-shrink: 0; }
.pct-alto { background: var(--alto-bg); color: var(--alto-c); }
.pct-medio { background: var(--medio-bg); color: var(--medio-c); }
.pct-bajo { background: var(--bajo-bg); color: var(--bajo-c); }
.bank-det { font-size: 11px; color: var(--muted); line-height: 1.5; }
.day-tag { display: inline-block; margin-top: 6px; font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.app-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
.app-nombre { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
.app-det { font-size: 11px; color: var(--muted); line-height: 1.4; }

.no-results { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }

footer { text-align: center; padding: 2rem 1rem; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 2rem; font-family: 'DM Mono', monospace; }

@media (max-width: 600px) {
  .cards-grid { grid-template-columns: 1fr; }
  .hoy-grid { grid-template-columns: repeat(2, 1fr); }
  .header-inner { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-box">⛽</div>
      <h1>Descuentos en nafta · Argentina</h1>
    </div>
    <div class="header-right">
      <span class="update-chip" id="update-chip">cargando...</span>
      <div class="toggle-wrap">
        <span class="toggle-icon" id="toggle-icon">🌙</span>
        <button class="dark-toggle" id="dark-toggle" title="Cambiar tema"></button>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="section-title" id="hoy-titulo">Mejores descuentos hoy</div>
  <div class="hoy-grid" id="hoy-grid"></div>

  <div class="filters" id="filtros-estacion">
    <button class="filter-btn" data-estacion="todas" style="background:var(--text);color:var(--bg);border-color:var(--text);">Todas</button>
  </div>

  <div class="day-row">
    <span class="day-lbl">Día</span>
    <button class="day-btn active" data-dia="todos">Todos</button>
    <button class="day-btn" data-dia="Lunes">Lun</button>
    <button class="day-btn" data-dia="Martes">Mar</button>
    <button class="day-btn" data-dia="Miércoles">Mié</button>
    <button class="day-btn" data-dia="Jueves">Jue</button>
    <button class="day-btn" data-dia="Viernes">Vie</button>
    <button class="day-btn" data-dia="Sábados">Sáb</button>
    <button class="day-btn" data-dia="Domingos">Dom</button>
  </div>

  <div id="contenido"></div>
</div>

<footer>datos actualizados automáticamente · solo orientativo, verificar con cada banco</footer>

<script>
const DIAS = ['Domingos','Lunes','Martes','Miércoles','Jueves','Viernes','Sábados'];
const HOY = DIAS[new Date().getDay()];
const COLORES = { ypf:'#009B77', shell:'#DD1D21', axion:'#0057A8', puma:'#6B21A8' };
const INICIALES = { ypf:'YPF', shell:'SHL', axion:'AXN', puma:'PMA' };

let data = null, estacionActiva = 'todas', diaActivo = 'todos', isDark = false;

async function cargarData() {
  const res = await fetch('data.json?v=' + Date.now());
  data = await res.json();
  document.getElementById('update-chip').textContent = 'actualizado ' + data.ultima_actualizacion;
  initFiltros();
  renderHoy();
  renderContenido();
}

function matchDia(dia, filtro) {
  if (filtro === 'todos') return true;
  if (!dia) return false;
  const dl = dia.toLowerCase();
  if (dl.includes('todos')) return true;
  const m = { Lunes:'lunes', Martes:'martes', 'Miércoles':'mié', Jueves:'jueves', Viernes:'viernes', Sábados:'sáb', Domingos:'dom' };
  return dl.includes((m[filtro] || filtro).toLowerCase());
}

function renderHoy() {
  const grid = document.getElementById('hoy-grid');
  document.getElementById('hoy-titulo').textContent = 'Mejores descuentos hoy — ' + HOY;
  let cards = [];
  data.estaciones.forEach(e => {
    e.bancos.filter(b => matchDia(b.dia, HOY) && b.nivel === 'alto').forEach(b => {
      cards.push({ ...b, estacion: e.nombre, color: e.color });
    });
  });
  (data.descuentos_generales || []).filter(b => matchDia(b.dia, HOY) && b.nivel === 'alto').forEach(b => {
    cards.push({ ...b, estacion: 'Todas las marcas', color: '#888' });
  });
  if (!cards.length) {
    grid.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:1rem 0;">Sin descuentos destacados para hoy.</p>';
    return;
  }
  cards.sort((a, b) => parseInt(b.descuento) - parseInt(a.descuento));
  grid.innerHTML = cards.slice(0, 6).map(c =>
    '<div class="hoy-card" style="background:' + c.color + '12;border-color:' + c.color + '28;">' +
    '<div class="hoy-accent" style="background:' + c.color + ';"></div>' +
    '<div class="hoy-banco">' + c.banco + '</div>' +
    '<div class="hoy-pct" style="color:' + c.color + '">' + c.descuento + '</div>' +
    '<span class="hoy-chip" style="background:' + c.color + '18;color:' + c.color + ';">' + c.estacion + '</span>' +
    '<div class="hoy-det">' + c.detalle + '</div>' +
    '</div>'
  ).join('');
}

function renderContenido() {
  const div = document.getElementById('contenido');
  const estaciones = estacionActiva === 'todas' ? data.estaciones : data.estaciones.filter(e => e.id === estacionActiva);
  let html = '';
  estaciones.forEach(e => {
    const color = e.color || COLORES[e.id] || '#888';
    const bancos = e.bancos.filter(b => matchDia(b.dia, diaActivo));
    if (diaActivo !== 'todos' && !bancos.length) return;
    const fb = INICIALES[e.id] || e.nombre.slice(0, 3);
    html += '<div class="station-block">' +
      '<div class="station-header">' +
      '<div class="station-logo" style="border-color:' + color + '30;">' +
      '<img src="logos/' + e.id + '.jpg" alt="' + e.nombre + '" ' +
      'onerror="this.src=\'logos/' + e.id + '.png\';this.onerror=function(){this.parentElement.outerHTML=\'<div class=station-logo-fallback style=background:' + color + '>' + fb + '</div>\'}">' +
      '</div>' +
      '<div><div class="station-name">' + e.nombre + '</div>' +
      '<div class="station-sub">' + bancos.length + ' descuento' + (bancos.length !== 1 ? 's' : '') + ' ' + (diaActivo === 'todos' ? 'disponibles' : 'para ' + diaActivo.toLowerCase()) + '</div></div>' +
      '</div>';
    if (diaActivo === 'todos' && e.apps && e.apps.length) {
      html += '<div class="sub-label">Beneficios propios / apps</div>' +
        '<div class="cards-grid" style="margin-bottom:10px;">' +
        e.apps.map(a => '<div class="app-card"><div class="app-nombre">' + a.nombre + '</div><div class="app-det">' + a.detalle + '</div></div>').join('') +
        '</div>';
    }
    if (bancos.length) {
      html += '<div class="sub-label">Descuentos bancarios</div><div class="cards-grid">' +
        bancos.map(b =>
          '<div class="bank-card">' +
          '<div class="bank-accent" style="background:' + color + '"></div>' +
          '<div class="bank-top"><span class="bank-nombre">' + b.banco + '</span><span class="pct-pill pct-' + b.nivel + '">' + b.descuento + '</span></div>' +
          '<div class="bank-det">' + b.detalle + '</div>' +
          '<span class="day-tag">' + b.dia + '</span>' +
          '</div>'
        ).join('') + '</div>';
    }
    html += '</div>';
  });
  if (!html) html = '<div class="no-results">Sin descuentos para este filtro.</div>';
  div.innerHTML = html;
}

function initFiltros() {
  const filtros = document.getElementById('filtros-estacion');
  data.estaciones.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.estacion = e.id;
    btn.textContent = e.nombre;
    filtros.appendChild(btn);
  });
  filtros.addEventListener('click', ev => {
    const btn = ev.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => { b.style.background = ''; b.style.color = ''; b.style.borderColor = ''; });
    const color = COLORES[btn.dataset.estacion];
    if (color) { btn.style.background = color; btn.style.color = '#fff'; btn.style.borderColor = color; }
    else { btn.style.cssText = 'background:var(--text);color:var(--bg);border-color:var(--text);'; }
    estacionActiva = btn.dataset.estacion;
    renderContenido();
  });
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      diaActivo = btn.dataset.dia;
      renderContenido();
    });
  });
}

document.getElementById('dark-toggle').addEventListener('click', () => {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('toggle-icon').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') {
  isDark = true;
  document.body.classList.add('dark');
  document.getElementById('toggle-icon').textContent = '☀️';
}

cargarData();
</script>
</body>
</html>
