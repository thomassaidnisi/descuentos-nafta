<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descuentos en Nafta Argentina</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: #e2e2de;
    --text: #1a1a18;
    --muted: #6b6b67;
    --radius: 12px;
    --alto-bg: #eaf3de; --alto-color: #3b6d11;
    --medio-bg: #e6f1fb; --medio-color: #185fa5;
    --bajo-bg: #f1efe8; --bajo-color: #5f5e5a;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 1.5rem; position: sticky; top: 0; z-index: 10; }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 18px; font-weight: 600; }
  #fecha-update { font-size: 12px; color: var(--muted); }

  .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .filter-btn { font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: #aaa; color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .day-filter { margin-bottom: 2rem; }
  .day-filter label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 8px; }
  .days { display: flex; flex-wrap: wrap; gap: 6px; }
  .day-btn { font-size: 12px; padding: 4px 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .day-btn:hover { border-color: #aaa; }
  .day-btn.active { background: #f0f0ee; color: var(--text); border-color: #bbb; font-weight: 500; }

  .station-block { margin-bottom: 2rem; }
  .station-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .station-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .station-name { font-size: 16px; font-weight: 600; }

  .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 12px 0 8px; }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .card-nombre { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .pct { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
  .pct.alto { background: var(--alto-bg); color: var(--alto-color); }
  .pct.medio { background: var(--medio-bg); color: var(--medio-color); }
  .pct.bajo { background: var(--bajo-bg); color: var(--bajo-color); }
  .card-detalle { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .day-tag { display: inline-block; margin-top: 6px; font-size: 11px; padding: 2px 8px; border-radius: 8px; background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

  .app-card { background: #fafaf8; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .app-nombre { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .app-detalle { font-size: 12px; color: var(--muted); }

  .general-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 2rem; }
  .general-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 10px; }

  .empty-msg { color: var(--muted); font-size: 14px; padding: 1rem 0; }

  footer { text-align: center; padding: 2rem 1rem; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 1rem; }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .header-inner { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>⛽ Descuentos en Nafta · Argentina</h1>
      <span id="fecha-update">Cargando...</span>
    </div>
    <div id="header-mes" style="font-size:14px;font-weight:500;color:#6b6b67;"></div>
  </div>
</header>

<div class="container">

  <div class="filters" id="filtros-estacion">
    <button class="filter-btn active" data-estacion="todas">Todas las estaciones</button>
  </div>

  <div class="day-filter">
    <label>Filtrar por día</label>
    <div class="days" id="filtros-dia">
      <button class="day-btn active" data-dia="todos">Todos los días</button>
      <button class="day-btn" data-dia="Lunes">Lunes</button>
      <button class="day-btn" data-dia="Martes">Martes</button>
      <button class="day-btn" data-dia="Miércoles">Miércoles</button>
      <button class="day-btn" data-dia="Jueves">Jueves</button>
      <button class="day-btn" data-dia="Viernes">Viernes</button>
      <button class="day-btn" data-dia="Sábados">Sábado</button>
      <button class="day-btn" data-dia="Domingos">Domingo</button>
    </div>
  </div>

  <div id="contenido"></div>

</div>

<footer>
  Datos actualizados automáticamente · Solo orientativo, verificar con cada banco · <a href="https://github.com" style="color:inherit">Ver en GitHub</a>
</footer>

<script>
let data = null;
let estacionActiva = 'todas';
let diaActivo = 'todos';

async function cargarData() {
  const res = await fetch('data.json?v=' + Date.now());
  data = await res.json();
  inicializar();
}

function inicializar() {
  document.getElementById('fecha-update').textContent = 'Última actualización: ' + data.ultima_actualizacion;
  document.getElementById('header-mes').textContent = data.mes;

  const filtros = document.getElementById('filtros-estacion');
  data.estaciones.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.estacion = e.id;
    btn.textContent = e.nombre;
    filtros.appendChild(btn);
  });

  filtros.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    estacionActiva = btn.dataset.estacion;
    renderizar();
  });

  document.getElementById('filtros-dia').addEventListener('click', e => {
    const btn = e.target.closest('.day-btn');
    if (!btn) return;
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    diaActivo = btn.dataset.dia;
    renderizar();
  });

  renderizar();
}

function matchDia(dia) {
  if (diaActivo === 'todos') return true;
  if (dia.toLowerCase().includes('todos')) return true;
  const mapa = { 'Lunes': 'lunes', 'Martes': 'martes', 'Miércoles': 'miér', 'Jueves': 'jueves', 'Viernes': 'viernes', 'Sábados': 'sáb', 'Domingos': 'dom' };
  const buscar = mapa[diaActivo] || diaActivo.toLowerCase();
  return dia.toLowerCase().includes(buscar);
}

function cardHTML(item, esApp) {
  if (esApp) {
    return `<div class="app-card">
      <div class="app-nombre">${item.nombre}</div>
      <div class="app-detalle">${item.detalle}</div>
    </div>`;
  }
  if (!matchDia(item.dia)) return '';
  return `<div class="card">
    <div class="card-top">
      <span class="card-nombre">${item.banco}</span>
      <span class="pct ${item.nivel}">${item.descuento}</span>
    </div>
    <div class="card-detalle">${item.detalle}</div>
    <span class="day-tag">${item.dia}</span>
  </div>`;
}

function renderizar() {
  const contenido = document.getElementById('contenido');
  let html = '';

  const estaciones = estacionActiva === 'todas'
    ? data.estaciones
    : data.estaciones.filter(e => e.id === estacionActiva);

  estaciones.forEach(e => {
    const bancoCards = e.bancos.map(b => cardHTML(b, false)).filter(Boolean).join('');

    if (diaActivo !== 'todos' && !bancoCards) return;

    html += `<div class="station-block">
      <div class="station-header">
        <div class="station-dot" style="background:${e.color}"></div>
        <span class="station-name">${e.nombre}</span>
      </div>`;

    if (diaActivo === 'todos' && e.apps.length) {
      html += `<div class="section-label">Beneficios propios / apps</div>
      <div class="cards-grid" style="margin-bottom:12px;">
        ${e.apps.map(a => cardHTML(a, true)).join('')}
      </div>`;
    }

    if (bancoCards) {
      html += `<div class="section-label">Descuentos bancarios</div>
      <div class="cards-grid">${bancoCards}</div>`;
    }

    html += `</div>`;
  });

  if (estacionActiva === 'todas' && diaActivo === 'todos' && data.descuentos_generales?.length) {
    html += `<div class="general-section">
      <div class="general-title">Descuentos en todas las marcas</div>
      <div class="cards-grid">
        ${data.descuentos_generales.map(b => cardHTML(b, false)).filter(Boolean).join('')}
      </div>
    </div>`;
  }

  if (!html) html = `<p class="empty-msg">No hay descuentos para el filtro seleccionado.</p>`;

  contenido.innerHTML = html;
}

cargarData();
</script>
</body>
</html>
