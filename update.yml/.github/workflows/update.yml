name: Actualizar descuentos

on:
  schedule:
    # Corre todos los días a las 8am hora Argentina (UTC-3 = 11:00 UTC)
    - cron: '0 11 * * *'
  # También permite correrlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Correr script de actualización
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_data.py

      - name: Commitear cambios si hubo actualizaciones
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --staged --quiet || git commit -m "Actualizar descuentos $(date +'%Y-%m-%d')"
          git push
